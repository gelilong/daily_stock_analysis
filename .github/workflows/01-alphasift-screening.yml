name: AlphaSift 全市场选股

on:
  schedule:
    # 周一到周五 UTC 10:45 = 北京时间 18:45（比自选股分析晚45分钟，错峰执行）
    - cron: '45 10 * * 1-5'
  workflow_dispatch:
    inputs:
      strategy:
        description: '选股策略'
        required: true
        default: 'volume_breakout'
        type: choice
        options:
          - volume_breakout    # 放量突破
          - dual_low           # 双低选股
          - momentum_quality   # 趋势质量
          - shrink_pullback    # 缩量回踩
          - oversold_reversal  # 超跌反转
          - quality_value      # 稳健价值
          - capital_heat       # 资金热度
          - balanced_alpha     # 均衡多因子
      top_n:
        description: '输出候选数量'
        required: false
        default: '10'
        type: string

concurrency:
  group: alphasift-screening
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 30))
      
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: mkdir -p data logs reports alphasift_output

      - name: 执行 AlphaSift 全市场选股
        env:
          # AI 配置
          LLM_CHANNELS: ${{ vars.LLM_CHANNELS || secrets.LLM_CHANNELS }}
          LLM_DEEPSEEK_PROTOCOL: ${{ vars.LLM_DEEPSEEK_PROTOCOL || secrets.LLM_DEEPSEEK_PROTOCOL }}
          LLM_DEEPSEEK_BASE_URL: ${{ vars.LLM_DEEPSEEK_BASE_URL || secrets.LLM_DEEPSEEK_BASE_URL }}
          LLM_DEEPSEEK_API_KEY: ${{ secrets.LLM_DEEPSEEK_API_KEY }}
          LLM_DEEPSEEK_MODELS: ${{ vars.LLM_DEEPSEEK_MODELS || secrets.LLM_DEEPSEEK_MODELS }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANSPIRE_API_KEYS: ${{ secrets.ANSPIRE_API_KEYS }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}
          
          # 数据源
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          SNAPSHOT_SOURCE_PRIORITY: tushare
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}
          SEARXNG_PUBLIC_INSTANCES_ENABLED: ${{ vars.SEARXNG_PUBLIC_INSTANCES_ENABLED || secrets.SEARXNG_PUBLIC_INSTANCES_ENABLED || 'true' }}
          
          # 通知
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          
          # 运行配置
          LOG_LEVEL: INFO
          MAX_WORKERS: 1
          
        run: |
          STRATEGY="${{ github.event.inputs.strategy || 'volume_breakout' }}"
          TOP_N="${{ github.event.inputs.top_n || '10' }}"
          
          echo "=========================================="
          echo "🔍 AlphaSift 全市场选股"
          echo "=========================================="
          echo "⏰ 时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "📊 策略: $STRATEGY"
          echo "🔢 输出候选: Top $TOP_N"
          echo "🗄️ 数据源: Tushare"
          echo "=========================================="
          echo ""
          
          # 列出可用策略
          echo "📋 可用策略列表:"
          alphasift strategies
          echo ""
          
          # 执行选股（带 LLM 排序）
          echo "🚀 开始选股..."
          alphasift screen "$STRATEGY" \
            --max-output "$TOP_N" \
            --save-run \
            --explain \
            2>&1 | tee alphasift_output/screen_result.txt
          
          SCREEN_EXIT=$?
          echo ""
          echo "=========================================="
          if [ $SCREEN_EXIT -eq 0 ]; then
            echo "✅ 选股完成"
          else
            echo "⚠️ 选股完成（存在部分降级）"
          fi
          echo "=========================================="
      
      - name: 发送选股结果通知
        if: always()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          if [ -z "$PUSHPLUS_TOKEN" ]; then
            echo "⚠️ PushPlus Token 未配置，跳过通知"
            exit 0
          fi

          STRATEGY="${{ github.event.inputs.strategy || 'volume_breakout' }}"
          DATE_STR="$(TZ='Asia/Shanghai' date '+%Y-%m-%d')"

          # 构建推送内容
          if [ -f alphasift_output/screen_result.txt ]; then
            CONTENT=$(cat alphasift_output/screen_result.txt | head -100)
          else
            CONTENT="选股任务已执行，但未生成结果文件"
          fi

          # 推送到 PushPlus
          curl -s -X POST http://www.pushplus.plus/send \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "
import json, sys
msg = {
    'token': '$PUSHPLUS_TOKEN',
    'title': f'🔍 AlphaSift 选股日报 | {STRATEGY} | {DATE_STR}',
    'content': '''$CONTENT''',
    'template': 'txt'
}
print(json.dumps(msg, ensure_ascii=False))
            ")" > /dev/null 2>&1
          
          echo "✅ 选股结果已推送到微信（PushPlus）"

      - name: 上传选股结果
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: alphasift-results-${{ github.run_number }}
          path: |
            alphasift_output/
            data/alphasift_runs/
          retention-days: 30
