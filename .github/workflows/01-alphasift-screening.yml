name: AlphaSift Screening

on:
  schedule:
    - cron: '45 10 * * 1-5'
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Screening strategy'
        required: true
        default: 'volume_breakout'
        type: string
      top_n:
        description: 'Number of candidates'
        required: false
        default: '10'
        type: string

concurrency:
  group: alphasift-screening
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Random delay
        run: sleep $((RANDOM % 30))
      
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create directories
        run: mkdir -p data logs reports alphasift_output

      - name: Run AlphaSift Screening
        env:
          LLM_CHANNELS: ${{ vars.LLM_CHANNELS || secrets.LLM_CHANNELS }}
          LLM_DEEPSEEK_PROTOCOL: ${{ vars.LLM_DEEPSEEK_PROTOCOL || secrets.LLM_DEEPSEEK_PROTOCOL }}
          LLM_DEEPSEEK_BASE_URL: ${{ vars.LLM_DEEPSEEK_BASE_URL || secrets.LLM_DEEPSEEK_BASE_URL }}
          LLM_DEEPSEEK_API_KEY: ${{ secrets.LLM_DEEPSEEK_API_KEY }}
          LLM_DEEPSEEK_MODELS: ${{ vars.LLM_DEEPSEEK_MODELS || secrets.LLM_DEEPSEEK_MODELS }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANSPIRE_API_KEYS: ${{ secrets.ANSPIRE_API_KEYS }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          SNAPSHOT_SOURCE_PRIORITY: tushare
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}
          SEARXNG_PUBLIC_INSTANCES_ENABLED: ${{ vars.SEARXNG_PUBLIC_INSTANCES_ENABLED || secrets.SEARXNG_PUBLIC_INSTANCES_ENABLED || 'true' }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          LOG_LEVEL: INFO
          MAX_WORKERS: 1
        run: |
          STRATEGY="${{ github.event.inputs.strategy || 'volume_breakout' }}"
          TOP_N="${{ github.event.inputs.top_n || '10' }}"
          
          echo "=========================================="
          echo "AlphaSift Full Market Screening"
          echo "Time: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "Strategy: $STRATEGY"
          echo "Top N: $TOP_N"
          echo "Data source: Tushare"
          echo "=========================================="
          
          echo "Available strategies:"
          alphasift strategies
          echo ""
          
          echo "Running screening..."
          alphasift screen "$STRATEGY" \
            --max-output "$TOP_N" \
            --save-run \
            --explain \
            2>&1 | tee alphasift_output/screen_result.txt
          
          SCREEN_EXIT=$?
          echo ""
          if [ $SCREEN_EXIT -eq 0 ]; then
            echo "Screening completed successfully"
          else
            echo "Screening completed with warnings"
          fi
      
      - name: Send PushPlus notification
        if: always()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          if [ -z "$PUSHPLUS_TOKEN" ]; then
            echo "PushPlus token not configured, skipping notification"
            exit 0
          fi

          STRATEGY="${{ github.event.inputs.strategy || 'volume_breakout' }}"
          DATE_STR="$(TZ='Asia/Shanghai' date '+%Y-%m-%d')"

          if [ -f alphasift_output/screen_result.txt ]; then
            CONTENT=$(cat alphasift_output/screen_result.txt | head -80)
          else
            CONTENT="Screening task completed but no result file found"
          fi

          python3 -c "
import json, urllib.request
msg = {
    'token': '$PUSHPLUS_TOKEN',
    'title': f'AlphaSift | {STRATEGY} | {DATE_STR}',
    'content': '''$CONTENT''',
    'template': 'txt'
}
req = urllib.request.Request(
    'http://www.pushplus.plus/send',
    data=json.dumps(msg).encode('utf-8'),
    headers={'Content-Type': 'application/json'}
)
urllib.request.urlopen(req)
          "
          
          echo "Results sent to WeChat via PushPlus"

      - name: Upload results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: alphasift-results-${{ github.run_number }}
          path: |
            alphasift_output/
            data/alphasift_runs/
          retention-days: 30
